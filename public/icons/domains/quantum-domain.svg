<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Quantum Domain icon – core cognition with particle entanglement" class="cosmic-icon quantum-domain">
  <defs>
    <linearGradient id="quantum-gradient" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <radialGradient id="particle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stopColor="#74b9ff" stopOpacity="0.9"/>
      <stop offset="100%" stopColor="#00cec9" stopOpacity="0"/>
    </radialGradient>
    <filter id="quantum-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main quantum orbits -->
  <path d="M95.787 64.776c0 17.555-14.231 31.786-31.786 31.786-17.555 0-31.786-14.231-31.786-31.786 0-17.555 14.231-31.786 31.786-31.786 17.555 0 31.786 14.231 31.786 31.786Z" 
        fill="url(#quantum-gradient)" 
        opacity="0.7"
        filter="url(#quantum-glow)"/>
  
  <!-- Quantum entanglement paths -->
  <path d="M59.999 94.563c17.555 0 31.786-14.231 31.786-31.787 0-11.655-6.273-21.845-15.627-27.378" 
        fill="none" 
        stroke="#00cec9" 
        strokeWidth="1.2" 
        stroke-linecap="round"/>
  
  <!-- Particle wave orbits -->
  <path d="M27.013 43.028c2.203 10.35 8.877 22.733 18.211 34.764 9.334 12.03 19.671 21.572 28.901 27.246 4.608 2.833 9.035 4.76 12.989 5.497 3.952.736 7.673.317 10.522-1.893 2.848-2.21 4.179-5.71 4.448-9.722.269-4.013-.498-8.78-2.097-13.947-3.203-10.35-9.877-22.733-19.211-34.764S62.105 28.636 52.875 22.962c-4.608-2.833-9.035-4.76-12.989-5.497-3.952-.736-7.673-.317-10.522 1.893-2.848 2.21-4.179 5.71-4.448 9.722-.269 4.013.498 8.78 2.097 13.948Z" 
        fill="none" 
        stroke="#6c5ce7" 
        strokeWidth="1.2" 
        stroke-linecap="round"/>
  
  <!-- Quantum field -->
  <path d="M105.565 52.188c-5.478 9.519-14.804 20.217-26.627 29.952-11.823 9.736-24.111 16.836-34.505 20.386-5.185 1.772-10.056 2.713-14.242 2.554-4.182-.159-8.042-1.446-10.58-4.528-2.538-3.082-3.06-7.118-2.414-11.253.647-4.138 2.505-8.738 5.238-13.487 5.478-9.519 14.804-20.217 26.627-29.952 11.823-9.736 24.111-16.836 34.505-20.386 5.185-1.772 10.056-2.713 14.242-2.554 4.182.159 8.042 1.446 10.58 4.528 2.538 3.082 3.06 7.118 2.414 11.253-.647 4.138-2.505 8.738-5.238 13.487Z" 
        fill="none" 
        stroke="#74b9ff" 
        strokeWidth="1.2" 
        stroke-linecap="round"/>
  
  <!-- Quantum particles -->
  <circle cx="107.783" cy="42.993" r="2.5" fill="url(#particle-glow)" stroke="#00cec9" strokeWidth="0.8"/>
  <circle cx="51.752" cy="46.811" r="2.5" fill="url(#particle-glow)" stroke="#74b9ff" strokeWidth="0.8"/>
  <circle cx="49.057" cy="97.284" r="3.5" fill="url(#particle-glow)" stroke="#6c5ce7" strokeWidth="0.8"/>
