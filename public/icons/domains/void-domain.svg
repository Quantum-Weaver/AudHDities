<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" role="img" aria-label="Void Domain icon – gravitational singularity with quantum orbits" class="cosmic-icon void-domain">
  <defs>
    <radialGradient id="void-singularity" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stopColor="#2d3436" stopOpacity="0.9"/>
      <stop offset="70%" stopColor="#6c5ce7" stopOpacity="0.4"/>
      <stop offset="100%" stopColor="#00cec9" stopOpacity="0"/>
    </radialGradient>
    <linearGradient id="void-orbit" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#2d3436"/>
      <stop offset="50%" stopColor="#6c5ce7"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
  </defs>

  <!-- Singularity Core - Darker for Void domain -->
  <circle cx="12" cy="12" r="2" fill="url(#void-singularity)" stroke="#2d3436" strokeWidth="1.2"/>
  
  <!-- Primary Orbits - Thinned and gradient applied -->
  <path d="M12 10C17 10 16.6 22 9 22" fill="none" stroke="url(#void-orbit)" strokeWidth="1.2" stroke-linecap="round"/>
  <path d="M12.3115 14C7.31152 14 7.71152 2 15.3115 2" fill="none" stroke="url(#void-orbit)" strokeWidth="1.2" stroke-linecap="round"/>
  <path d="M10 12.3115C10 7.31152 22 7.71152 22 15.3115" fill="none" stroke="url(#void-orbit)" strokeWidth="1.2" stroke-linecap="round"/>
  <path d="M14 12C14 17 2 16.6 2 9" fill="none" stroke="url(#void-orbit)" strokeWidth="1.2" stroke-linecap="round"/>
  
  <!-- Quantum Echo Orbits - Dashed and subtle -->
  <path opacity="0.6" d="M10.6313 10.6961C14.1669 7.16053 22.3693 15.9287 16.9953 21.3027" fill="none" stroke="#74b9ff" strokeWidth="1.0" stroke-linecap="round" stroke-dasharray="2 2"/>
  <path opacity="0.6" d="M13.6802 13.3039C10.1447 16.8395 1.94222 8.07135 7.31623 2.69734" fill="none" stroke="#74b9ff" strokeWidth="1.0" stroke-linecap="round" stroke-dasharray="2 2"/>
  <path opacity="0.6" d="M10.8516 13.5242C7.31605 9.98865 16.0842 1.78622 21.4582 7.16023" fill="none" stroke="#74b9ff" strokeWidth="1.0" stroke-linecap="round" stroke-dasharray="2 2"/>
  <path opacity="0.6" d="M13.4599 10.4758C16.9955 14.0113 8.22736 22.2138 2.85334 16.8398" fill="none" stroke="#74b9ff" strokeWidth="1.0" stroke-linecap="round" stroke-dasharray="2 2"/>
</svg>