<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img" aria-label="Principles icon – interconnected nodes of core truths" class="cosmic-icon principles">
  <defs>
    <linearGradient id="principles-gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="principles-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle -->
  <path d="M24,45.5A21.5,21.5,0,1,1,45.5,24,21.51,21.51,0,0,1,24,45.5Z" 
        fill="none" 
        stroke="url(#principles-gradient)" 
        strokeWidth="1.8" 
        stroke-linecap="round" 
        strokeLinejoin="round"
        filter="url(#principles-glow)"/>
  
  <!-- Connection lines -->
  <line x1="36.45" y1="11.42" x2="24.15" y2="20.38" 
        stroke="#00cec9" 
        strokeWidth="1.8" 
        stroke-linecap="round"/>
  <line x1="36.45" y1="11.42" x2="27.49" y2="23.73" 
        stroke="#74b9ff" 
        strokeWidth="1.8" 
        stroke-linecap="round"/>
  <line x1="11.54" y1="36.34" x2="23.84" y2="27.38" 
        stroke="#00cec9" 
        strokeWidth="1.8" 
        stroke-linecap="round"/>
  <line x1="11.54" y1="36.34" x2="20.5" y2="24.04" 
        stroke="#74b9ff" 
        strokeWidth="1.8" 
        stroke-linecap="round"/>
  
  <!-- Central node -->
  <circle cx="24" cy="23.88" r="3.5" 
          fill="url(#principles-gradient)" 
          stroke="#6c5ce7" 
          strokeWidth="1.2"/>
  
  <!-- Outer nodes -->
  <circle cx="36.45" cy="11.42" r="2" fill="#74b9ff"/>
  <circle cx="11.54" cy="36.34" r="2" fill="#74b9ff"/>
</svg>