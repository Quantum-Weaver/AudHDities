<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 512 512" role="img" aria-label="Threads social platform – interconnected conversation flows" class="cosmic-icon social-threads">
  <defs>
    <linearGradient id="threads-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="threads-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

