<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 512 512" role="img" aria-label="Steam Gaming Platform" class="cosmic-icon social-steam">
  <defs>
    <linearGradient id="steam-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="steam-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect width="512" height="512" rx="15%" fill="url(#steam-gradient)" filter="url(#steam-glow)"/>
  
  <!-- Steam logo paths with quantum styling -->
  <path d="m183 280 41 28 27 41 87-62-94-96" fill="#ffffff" opacity="0.9"/>
  
  <!-- Main circles with cosmic glow -->
  <circle cx="340" cy="190" r="49" fill="#ffffff" opacity="0.9" filter="url(#steam-glow)"/>
  
  <!-- Outline elements with teal stroke -->
  <g fill="none" stroke="#00cec9" strokeWidth="19">
    <circle cx="179" cy="352" r="63"/>
    <path d="m-18 271 195 81" stroke-linecap="round"/>
    <circle cx="340" cy="190" r="81" strokeWidth="32"/>
  </g>
</svg>