<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="Quantum Media Portal - streaming consciousness interface" class="cosmic-icon quantum-media">
  <defs>
    <linearGradient id="media-gradient" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="media-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Portal Frame -->
  <rect x="25" y="35" width="70" height="50" rx="8" fill="none" stroke="url(#media-gradient)" strokeWidth="1.8" stroke-linecap="round" filter="url(#media-glow)"/>
  
  <!-- Flowing Play Arrow -->
  <path d="M50 45l20 15-20 15z" fill="url(#media-gradient)" filter="url(#media-glow)"/>
  
  <!-- Portal Energy Points -->
  <circle cx="35" cy="45" r="2" fill="#74b9ff" opacity="0.7"/>
  <circle cx="85" cy="75" r="2" fill="#00cec9" opacity="0.7"/>
  <circle cx="60" cy="60" r="1.5" fill="#6c5ce7" opacity="0.9"/>
</svg>