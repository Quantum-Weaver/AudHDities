<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 48 48" role="img" aria-label="Quantum Portal icon – gateway between consciousness realms" class="cosmic-icon quantum-portal">
  <defs>
    <linearGradient id="portal-gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="portal-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Original path with quantum styling -->
  <path d="M40.25,4.45a14.26,14.26,0,0,1,2.06,7.8c0,9.72-8.3,22.34-15,31.2H11.91L5.74,6.58,19.21,5.3l3.27,26.24c3.05-5,6.81-12.76,6.81-18.08A14.51,14.51,0,0,0,28,6.94Z" 
        fill="none" 
        stroke="url(#portal-gradient)" 
        strokeWidth="1.5" 
        stroke-linecap="round" 
        strokeLinejoin="round"
        filter="url(#portal-glow)"/>
  
  <!-- Add quantum energy points -->
  <circle cx="24" cy="24" r="2" fill="#74b9ff" opacity="0.8"/>
  <circle cx="32" cy="12" r="1.5" fill="#6c5ce7" opacity="0.6"/>
  <circle cx="16" cy="36" r="1.5" fill="#00cec9" opacity="0.6"/>
</svg>