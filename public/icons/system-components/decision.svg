<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 32 32" role="img" aria-label="Decision System icon – structured choice pathways" class="cosmic-icon decision-system">
  <defs>
    <linearGradient id="decision-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="decision-glow" x="-50%" y="-50%" width="200%" height="200%">
