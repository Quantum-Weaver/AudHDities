<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 256 256" role="img" aria-label="Non-binary identity icon – quantum fluidity and sovereign self-expression" class="cosmic-icon non-binary">
  <defs>
    <linearGradient id="nonbinary-gradient" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="nonbinary-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

