<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 120 120" role="img" aria-label="Emergency - Crisis Response">
<defs>
    <linearGradient id="emergency-gradient" x1="0" y1="0" x2="120" y2="120">
    <stop offset="0%" stopColor="#ef4444"/>
    <stop offset="50%" stopColor="#ec4899"/>
    <stop offset="100%" stopColor="#f97316"/>
    </linearGradient>
    <radialGradient id="emergency-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stopColor="#ef4444" stopOpacity="0.8"/>
    <stop offset="100%" stopColor="#ec4899" stopOpacity="0"/>
    </radialGradient>
</defs>

{/* Outer Alert Circle */}
<circle cx="60" cy="60" r="40" fill="none" stroke="url(#emergency-gradient)" strokeWidth="3" opacity="0.8">
    <animate attributeName="r" values="40;45;40" dur="2s" repeatCount="indefinite"/>
</circle>

{/* Inner Heart Shape */}
<path 
    d="M60 40 
        C45 40 35 50 35 65 
        C35 80 50 95 60 100 
        C70 95 85 80 85 65 
        C85 50 75 40 60 40Z" 
    fill="url(#emergency-gradient)" 
    stroke="#ef4444" 
    strokeWidth="2"
/>

{/* Pulsing Core */}
<circle cx="60" cy="65" r="8" fill="#ffffff" opacity="0.9">
    <animate attributeName="r" values="8;12;8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="1.5s" repeatCount="indefinite"/>
</circle>

{/* Alert Rays */}
<path 
    d="M60 20 L60 10 M60 110 L60 120 M20 60 L10 60 M110 60 L120 60 
        M35 35 L25 25 M85 35 L95 25 M35 85 L25 95 M85 85 L95 95" 
    fill="none" 
    stroke="#ef4444" 
    strokeWidth="2" 
    opacity="0.7"
>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
</path>
</svg>