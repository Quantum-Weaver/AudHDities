<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 48 48" role="img" aria-label="Void Domain icon – gravitational singularity with cosmic pull" class="cosmic-icon void-domain">
  <defs>
    <radialGradient id="void-gradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stopColor="#2d3436" stopOpacity="0.9"/>
      <stop offset="60%" stopColor="#6c5ce7" stopOpacity="0.6"/>
      <stop offset="100%" stopColor="#00cec9" stopOpacity="0"/>
    </radialGradient>
    <filter id="void-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Original concentric circles with quantum styling -->
  <circle cx="24" cy="24" r="21.5" fill="none" stroke="url(#void-gradient)" strokeWidth="1.2" stroke-linecap="round" filter="url(#void-glow)"/>
  <circle cx="24" cy="24" r="16.5" fill="none" stroke="url(#void-gradient)" strokeWidth="1.2" stroke-linecap="round" opacity="0.8"/>
  <circle cx="24" cy="24" r="11.5" fill="none" stroke="url(#void-gradient)" strokeWidth="1.2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="24" cy="24" r="6.5" fill="none" stroke="#00cec9" strokeWidth="1.5" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Accent gravitational pull effect -->
  <path d="M24 2.5v5M24 40.5v5M2.5 24h5M40.5 24h5" fill="none" stroke="#74b9ff" strokeWidth="1" stroke-linecap="round" opacity="0.7"/>
</svg>