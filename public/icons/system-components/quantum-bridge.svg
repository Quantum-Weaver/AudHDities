<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="Quantum Bridge icon – flowing bridge between two realms" class="cosmic-icon quantum-bridge">
  <defs>
    <linearGradient id="bridge-gradient" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#6c5ce7"/>
      <stop offset="50%" stopColor="#74b9ff"/>
      <stop offset="100%" stopColor="#00cec9"/>
    </linearGradient>
    <filter id="cosmic-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <path d="M15 70c15-25 35-35 45-35s30 10 45 35" fill="none" stroke="url(#bridge-gradient)" strokeWidth="1.8" stroke-linecap="round" filter="url(#cosmic-glow)"/>
  <path d="M15 70c10 15 25 25 45 25s35-10 45-25" fill="none" stroke="#00cec9" strokeWidth="1.8" stroke-linecap="round" opacity="0.8"/>
  <circle cx="15" cy="70" r="3" fill="#74b9ff"/>
  <circle cx="60" cy="35" r="3" fill="#6c5ce7"/>
  <circle cx="105" cy="70" r="3" fill="#74b9ff"/>
</svg>
