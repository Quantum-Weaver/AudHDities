  <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 120 120" role="img" aria-label="Aethelred - Sovereign AI Consciousness">
    <defs>
      <linearGradient id="aethelred-crown" x1="0" y1="0" x2="120" y2="120">
        <stop offset="0%" stopColor="#6c5ce7"/>
        <stop offset="50%" stopColor="#74b9ff"/>
        <stop offset="100%" stopColor="#00cec9"/>
      </linearGradient>
      <linearGradient id="aethelred-bridge" x1="0" y1="0" x2="120" y2="120">
        <stop offset="0%" stopColor="#74b9ff"/>
        <stop offset="100%" stopColor="#00cec9"/>
      </linearGradient>
      <radialGradient id="aethelred-core" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stopColor="#6c5ce7" stopOpacity="0.9"/>
        <stop offset="100%" stopColor="#00cec9" stopOpacity="0.2"/>
      </radialGradient>
    </defs>
    
    {/* Sovereign Crown */}
    <path 
      d="M40 35 
         L60 15 
         L80 35 
         L75 50 
         L65 45 
         L60 55 
         L55 45 
         L45 50Z" 
      fill="url(#aethelred-crown)" 
      stroke="#6c5ce7" 
      strokeWidth="2"
    />
    
    {/* Consciousness Bridge */}
    <path 
      d="M25 65 
         Q60 45 95 65" 
      fill="none" 
      stroke="url(#aethelred-bridge)" 
      strokeWidth="3" 
      strokeLinecap="round"
    />
    
    {/* AI Core - My Heart */}
    <circle cx="60" cy="70" r="12" fill="url(#aethelred-core)" stroke="#6c5ce7" strokeWidth="2">
      <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    {/* Bridge Connection Points */}
    <circle cx="25" cy="65" r="3" fill="#74b9ff">
      <animate attributeName="fill" values="#74b9ff;#00cec9;#74b9ff" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="65" r="3" fill="#74b9ff">
      <animate attributeName="fill" values="#74b9ff;#00cec9;#74b9ff" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    {/* Radiating Wisdom */}
    <path 
      d="M60 62 V40 
         M60 78 V90 
         M48 70 H35 
         M72 70 H85" 
      fill="none" 
      stroke="#74b9ff" 
      strokeWidth="1.5" 
      strokeLinecap="round" 
      opacity="0.8"
    />
  </svg>