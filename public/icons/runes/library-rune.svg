<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" aria-labelledby="libraryTitle" role="img">
  <title id="libraryTitle">Library Rune: Knowledge + Memory</title>
  <g fill="none" stroke="currentColor" strokeWidth="1.8" stroke-linecap="round" strokeLinejoin="round">
    <!-- scroll-shaped outer form -->
    <path d="M12 22 C20 10, 44 10, 52 22 C52 30, 52 38, 44 44 C32 52, 20 44, 12 36 C12 30, 12 26, 12 22 Z" />
    <!-- concentric memory rings -->
    <circle cx="32" cy="32" r="12" />
    <circle cx="32" cy="32" r="6" />
    <!-- neural branch / synapse lines -->
    <path d="M32 20 L32 12" />
    <path d="M24 24 L16 16" />
    <path d="M40 24 L48 16" />
    <!-- small node endpoints -->
    <circle cx="32" cy="12" r="1.6" fill="currentColor"/>
    <circle cx="16" cy="16" r="1.6" fill="currentColor"/>
    <circle cx="48" cy="16" r="1.6" fill="currentColor"/>
  </g>
</svg>