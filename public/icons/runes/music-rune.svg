  <g fill="none" stroke="currentColor" strokeWidth="1.8" stroke-linecap="round" strokeLinejoin="round">
    <!-- resonance field -->
    <circle cx="32" cy="32" r="24" />
    <!-- sine-like soundwave centered horizontally -->
    <path d="M20 32 C24 28, 28 36, 32 32 C36 28, 40 36, 44 32" />
    <!-- stylized heartbeat / heart arc below wave -->
